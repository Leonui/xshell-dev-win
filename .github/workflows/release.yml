name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend tests
        run: npm test -- --run

      - name: Frontend production build
        run: npm run build

      - name: Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build, verify, and publish (Tauri)
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Keep this defined even for a passwordless key so the signer does not prompt.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # The wrapper verifies the exact updater artifacts before tauri-action can upload them.
          tauriScript: npm run tauri:verified --
          tagName: 'v__VERSION__'
          releaseName: 'xshell v__VERSION__'
          releaseBody: |
            See the assets below to download and install this version.

            Binaries are not yet code-signed:
            - **Windows:** SmartScreen will warn — click *More info → Run anyway*.
            - **macOS:** right-click the app → *Open* (twice) on first launch.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Assert signed Windows package set
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $required = @(
            Get-Item 'src-tauri/target/release/xshell.exe' -ErrorAction Stop
            Get-ChildItem 'src-tauri/target/release/bundle/msi' -Filter '*.msi' -File | Select-Object -First 1
            Get-ChildItem 'src-tauri/target/release/bundle/msi' -Filter '*.msi.sig' -File | Select-Object -First 1
            Get-ChildItem 'src-tauri/target/release/bundle/nsis' -Filter '*.exe' -File | Select-Object -First 1
            Get-ChildItem 'src-tauri/target/release/bundle/nsis' -Filter '*.exe.sig' -File | Select-Object -First 1
          )
          if ($required.Count -ne 5 -or $required -contains $null) {
            throw 'Missing portable EXE, MSI, NSIS, or updater signature artifact.'
          }
          foreach ($artifact in $required) {
            if ($artifact.Length -le 0) { throw "Empty artifact: $($artifact.FullName)" }
          }

      # Upload the raw xshell.exe (portable build, no installer wrapper) so the
      # npm wrapper can fetch it directly without triggering a UAC install dialog.
      - name: Upload portable Windows binary
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tauri.outputs.appVersion }}"
          cp src-tauri/target/release/xshell.exe "xshell_${VERSION}_x64.exe"
          gh release upload "v${VERSION}" "xshell_${VERSION}_x64.exe" --clobber
